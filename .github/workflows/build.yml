name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-cpp:
    name: Build C++ (${{ matrix.configuration }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
        platform: [x64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce

      - name: Build Solution
        run: msbuild KojeomEngine.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} /v:minimal
        shell: cmd

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: engine-interop-${{ matrix.configuration }}
          path: |
            Editor/EngineInterop/bin/x64/${{ matrix.configuration }}/EngineInterop.dll
            Editor/EngineInterop/bin/x64/${{ matrix.configuration }}/EngineInterop.pdb
            lib/x64/${{ matrix.configuration }}/Engine.lib
            lib/x64/${{ matrix.configuration }}/Engine.pdb
          if-no-files-found: warn
          retention-days: 7

  build-samples:
    name: Build Sample ${{ matrix.sample }} (${{ matrix.configuration }})
    runs-on: windows-latest
    needs: build-cpp
    strategy:
      fail-fast: false
      matrix:
        sample:
          - BasicRenderingSample
          - LightingSample
          - PBRSample
          - PostProcessingSample
          - DebugRenderingSample
          - TerrainSample
          - WaterSample
          - SkySample
          - ParticlesSample
          - SkeletalMeshSample
          - AnimationStateMachineSample
          - GameplaySample
          - PhysicsSample
          - UISample
          - LayoutSample
          - LODSample
        configuration: [Debug, Release]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: engine-interop-${{ matrix.configuration }}

      - name: Build ${{ matrix.sample }}
        run: msbuild KojeomEngine.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=x64 /t:${{ matrix.sample }} /v:minimal
        shell: cmd

  build-csharp:
    name: Build C# Editor (${{ matrix.configuration }})
    runs-on: windows-latest
    needs: build-cpp
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: '8.0.x'

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: engine-interop-${{ matrix.configuration }}

      - name: Restore Dependencies
        run: dotnet restore Editor/KojeomEditor/KojeomEditor.csproj
        shell: cmd

      - name: Build KojeomEditor
        run: dotnet build Editor/KojeomEditor/KojeomEditor.csproj -c ${{ matrix.configuration }}
        shell: cmd
