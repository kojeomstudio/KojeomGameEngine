name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-cpp:
    name: Build C++ Engine & Samples
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Debug, Release]
        platform: [x64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.vcxproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build Solution
        run: msbuild KojeomEngine.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} /v:minimal
        shell: cmd

  build-csharp:
    name: Build C# Editor
    runs-on: windows-latest
    needs: build-cpp
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: dotnet-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: dotnet-${{ runner.os }}-

      - name: Restore Dependencies
        run: dotnet restore Editor/KojeomEditor/KojeomEditor.csproj
        shell: cmd

      - name: Build KojeomEditor
        run: dotnet build Editor/KojeomEditor/KojeomEditor.csproj -c Release
        shell: cmd
