name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-engine:
    name: Build Engine + Interop (${{ matrix.configuration }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce

      - name: Build Engine and EngineInterop
        run: msbuild KojeomEngine.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=x64 /t:Engine;EngineInterop /v:minimal
        shell: cmd

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: engine-interop-${{ matrix.configuration }}
          path: |
            Editor/EngineInterop/bin/x64/${{ matrix.configuration }}/EngineInterop.dll
            lib/x64/${{ matrix.configuration }}/Engine.lib
          if-no-files-found: error
          retention-days: 7

  build-samples:
    name: Build ${{ matrix.sample }} (${{ matrix.configuration }})
    runs-on: windows-latest
    needs: build-engine
    strategy:
      fail-fast: false
      matrix:
        include:
          - sample: BasicRenderingSample
            path: samples\BasicRendering\BasicRenderingSample.vcxproj
          - sample: LightingSample
            path: samples\Lighting\LightingSample.vcxproj
          - sample: PBRSample
            path: samples\PBR\PBRSample.vcxproj
          - sample: PostProcessingSample
            path: samples\PostProcessing\PostProcessingSample.vcxproj
          - sample: DebugRenderingSample
            path: samples\DebugRendering\DebugRenderingSample.vcxproj
          - sample: TerrainSample
            path: samples\Terrain\TerrainSample.vcxproj
          - sample: WaterSample
            path: samples\Water\WaterSample.vcxproj
          - sample: SkySample
            path: samples\Sky\SkySample.vcxproj
          - sample: ParticlesSample
            path: samples\Particles\ParticlesSample.vcxproj
          - sample: SkeletalMeshSample
            path: samples\SkeletalMesh\SkeletalMeshSample.vcxproj
          - sample: AnimationStateMachineSample
            path: samples\AnimationStateMachine\AnimationStateMachineSample.vcxproj
          - sample: GameplaySample
            path: samples\Gameplay\GameplaySample.vcxproj
          - sample: PhysicsSample
            path: samples\Physics\PhysicsSample.vcxproj
          - sample: UISample
            path: samples\UI\UISample.vcxproj
          - sample: LayoutSample
            path: samples\UI\Layout\LayoutSample.vcxproj
          - sample: LODSample
            path: samples\LOD\LODSample.vcxproj
        configuration: [Debug, Release]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: engine-interop-${{ matrix.configuration }}

      - name: Build ${{ matrix.sample }}
        run: msbuild "${{ matrix.path }}" /p:Configuration=${{ matrix.configuration }} /p:Platform=x64 /v:minimal
        shell: cmd

  build-csharp:
    name: Build C# Editor (${{ matrix.configuration }})
    runs-on: windows-latest
    needs: build-engine
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: '8.0.x'

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: engine-interop-${{ matrix.configuration }}

      - name: Restore Dependencies
        run: dotnet restore Editor/KojeomEditor/KojeomEditor.csproj
        shell: cmd

      - name: Build KojeomEditor
        run: dotnet build Editor/KojeomEditor/KojeomEditor.csproj -c ${{ matrix.configuration }}
        shell: cmd
