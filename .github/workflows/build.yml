name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-cpp:
    name: Build C++ (${{ matrix.configuration }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
        platform: [x64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Solution
        run: msbuild KojeomEngine.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} /v:minimal
        shell: cmd

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: engine-interop-${{ matrix.configuration }}
          path: |
            Editor/EngineInterop/bin/x64/${{ matrix.configuration }}/EngineInterop.dll
            Editor/EngineInterop/bin/x64/${{ matrix.configuration }}/EngineInterop.pdb
            lib/x64/${{ matrix.configuration }}/Engine.lib
            lib/x64/${{ matrix.configuration }}/Engine.pdb
          if-no-files-found: warn
          retention-days: 7

  build-samples:
    name: Build Sample ${{ matrix.sample }} (${{ matrix.configuration }})
    runs-on: windows-latest
    needs: build-cpp
    strategy:
      fail-fast: false
      matrix:
        sample: [BasicRenderingSample, SkeletalMeshSample]
        configuration: [Debug, Release]
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: engine-interop-${{ matrix.configuration }}

      - name: Build ${{ matrix.sample }}
        run: msbuild KojeomEngine.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=x64 /t:${{ matrix.sample }} /v:minimal
        shell: cmd

  build-csharp:
    name: Build C# Editor (${{ matrix.configuration }})
    runs-on: windows-latest
    needs: build-cpp
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: engine-interop-${{ matrix.configuration }}

      - name: Restore Dependencies
        run: dotnet restore Editor/KojeomEditor/KojeomEditor.csproj
        shell: cmd

      - name: Build KojeomEditor
        run: dotnet build Editor/KojeomEditor/KojeomEditor.csproj -c ${{ matrix.configuration }}
        shell: cmd
