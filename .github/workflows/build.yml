name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-engine:
    name: Build Engine + Interop (${{ matrix.configuration }})
    runs-on: windows-2022
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce

      - name: Cache Engine build
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf
        with:
          path: |
            Engine/x64
            Editor/EngineInterop/x64
            lib/x64
          key: engine-${{ matrix.configuration }}-${{ hashFiles('Engine/**/*.h', 'Engine/**/*.cpp', 'Engine/Engine.vcxproj', 'Editor/EngineInterop/**') }}
          restore-keys: engine-${{ matrix.configuration }}-

      - name: Build Engine and EngineInterop
        run: msbuild KojeomEngine.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=x64 /t:Engine;EngineInterop /v:minimal
        shell: cmd

      - name: Verify build outputs
        shell: pwsh
        run: |
          $config = "${{ matrix.configuration }}"
          $engineLib = "lib/x64/$config/Engine.lib"
          $interopDll = "Editor/EngineInterop/bin/x64/$config/EngineInterop.dll"
          $missing = @()
          if (-not (Test-Path $engineLib)) { $missing += $engineLib }
          if (-not (Test-Path $interopDll)) { $missing += $interopDll }
          if ($missing.Count -gt 0) {
            Write-Error "Missing build outputs: $($missing -join ', ')"
            exit 1
          }
          Write-Host "All build outputs verified successfully"

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: engine-interop-${{ matrix.configuration }}
          path: |
            Editor/EngineInterop/bin/x64/${{ matrix.configuration }}/EngineInterop.dll
            lib/x64/${{ matrix.configuration }}/Engine.lib
          if-no-files-found: error
          retention-days: 7

  build-samples:
    name: Build Samples (${{ matrix.configuration }})
    runs-on: windows-2022
    timeout-minutes: 30
    needs: build-engine
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: engine-interop-${{ matrix.configuration }}
          path: .

      - name: Verify downloaded artifacts
        shell: pwsh
        run: |
          $config = "${{ matrix.configuration }}"
          $engineLib = "lib/x64/$config/Engine.lib"
          $interopDll = "Editor/EngineInterop/bin/x64/$config/EngineInterop.dll"
          if (-not (Test-Path $engineLib)) {
            Write-Error "Engine.lib not found at $engineLib"
            exit 1
          }
          if (-not (Test-Path $interopDll)) {
            Write-Error "EngineInterop.dll not found at $interopDll"
            exit 1
          }
          Write-Host "Artifacts verified: $engineLib, $interopDll"

      - name: Build all samples
        run: |
          msbuild KojeomEngine.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=x64 /t:BasicRenderingSample;LightingSample;PBRSample;PostProcessingSample;DebugRenderingSample;TerrainSample;WaterSample;SkySample;ParticlesSample;SkeletalMeshSample;AnimationStateMachineSample;GameplaySample;PhysicsSample;UISample;LayoutSample;LODSample;CLITestRunner /v:minimal
        shell: cmd

  build-csharp:
    name: Build C# Editor (${{ matrix.configuration }})
    runs-on: windows-2022
    timeout-minutes: 30
    needs: build-engine
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('Editor/KojeomEditor/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: engine-interop-${{ matrix.configuration }}
          path: .

      - name: Verify downloaded artifacts
        shell: pwsh
        run: |
          $config = "${{ matrix.configuration }}"
          $engineLib = "lib/x64/$config/Engine.lib"
          $interopDll = "Editor/EngineInterop/bin/x64/$config/EngineInterop.dll"
          if (-not (Test-Path $engineLib)) {
            Write-Error "Engine.lib not found at $engineLib"
            exit 1
          }
          if (-not (Test-Path $interopDll)) {
            Write-Error "EngineInterop.dll not found at $interopDll"
            exit 1
          }
          Write-Host "Artifacts verified: $engineLib, $interopDll"

      - name: Restore Dependencies
        run: dotnet restore Editor/KojeomEditor/KojeomEditor.csproj
        shell: cmd

      - name: Build KojeomEditor
        run: dotnet build Editor/KojeomEditor/KojeomEditor.csproj -c ${{ matrix.configuration }}
        shell: cmd

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build-engine, build-samples, build-csharp]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          echo "build-engine: ${{ needs.build-engine.result }}"
          echo "build-samples: ${{ needs.build-samples.result }}"
          echo "build-csharp: ${{ needs.build-csharp.result }}"
          if [[ "${{ needs.build-engine.result }}" == "success" && \
                "${{ needs.build-samples.result }}" == "success" && \
                "${{ needs.build-csharp.result }}" == "success" ]]; then
            exit 0
          fi
          exit 1
