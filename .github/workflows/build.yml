name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-engine:
    name: Build Engine + Interop (${{ matrix.configuration }})
    runs-on: windows-2022
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce

      - name: Build Engine and EngineInterop
        run: msbuild KojeomEngine.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=x64 /t:Engine;EngineInterop /v:minimal
        shell: cmd

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: engine-interop-${{ matrix.configuration }}
          path: |
            Editor/EngineInterop/bin/x64/${{ matrix.configuration }}/EngineInterop.dll
            lib/x64/${{ matrix.configuration }}/Engine.lib
          if-no-files-found: error
          retention-days: 7

  build-samples:
    name: Build ${{ matrix.sample }} (${{ matrix.configuration }})
    runs-on: windows-2022
    timeout-minutes: 30
    needs: build-engine
    strategy:
      fail-fast: false
      matrix:
        include:
          - sample: BasicRenderingSample
            path: samples\BasicRendering\BasicRenderingSample.vcxproj
            configuration: Debug
          - sample: BasicRenderingSample
            path: samples\BasicRendering\BasicRenderingSample.vcxproj
            configuration: Release
          - sample: LightingSample
            path: samples\Lighting\LightingSample.vcxproj
            configuration: Debug
          - sample: LightingSample
            path: samples\Lighting\LightingSample.vcxproj
            configuration: Release
          - sample: PBRSample
            path: samples\PBR\PBRSample.vcxproj
            configuration: Debug
          - sample: PBRSample
            path: samples\PBR\PBRSample.vcxproj
            configuration: Release
          - sample: PostProcessingSample
            path: samples\PostProcessing\PostProcessingSample.vcxproj
            configuration: Debug
          - sample: PostProcessingSample
            path: samples\PostProcessing\PostProcessingSample.vcxproj
            configuration: Release
          - sample: DebugRenderingSample
            path: samples\DebugRendering\DebugRenderingSample.vcxproj
            configuration: Debug
          - sample: DebugRenderingSample
            path: samples\DebugRendering\DebugRenderingSample.vcxproj
            configuration: Release
          - sample: TerrainSample
            path: samples\Terrain\TerrainSample.vcxproj
            configuration: Debug
          - sample: TerrainSample
            path: samples\Terrain\TerrainSample.vcxproj
            configuration: Release
          - sample: WaterSample
            path: samples\Water\WaterSample.vcxproj
            configuration: Debug
          - sample: WaterSample
            path: samples\Water\WaterSample.vcxproj
            configuration: Release
          - sample: SkySample
            path: samples\Sky\SkySample.vcxproj
            configuration: Debug
          - sample: SkySample
            path: samples\Sky\SkySample.vcxproj
            configuration: Release
          - sample: ParticlesSample
            path: samples\Particles\ParticlesSample.vcxproj
            configuration: Debug
          - sample: ParticlesSample
            path: samples\Particles\ParticlesSample.vcxproj
            configuration: Release
          - sample: SkeletalMeshSample
            path: samples\SkeletalMesh\SkeletalMeshSample.vcxproj
            configuration: Debug
          - sample: SkeletalMeshSample
            path: samples\SkeletalMesh\SkeletalMeshSample.vcxproj
            configuration: Release
          - sample: AnimationStateMachineSample
            path: samples\AnimationStateMachine\AnimationStateMachineSample.vcxproj
            configuration: Debug
          - sample: AnimationStateMachineSample
            path: samples\AnimationStateMachine\AnimationStateMachineSample.vcxproj
            configuration: Release
          - sample: GameplaySample
            path: samples\Gameplay\GameplaySample.vcxproj
            configuration: Debug
          - sample: GameplaySample
            path: samples\Gameplay\GameplaySample.vcxproj
            configuration: Release
          - sample: PhysicsSample
            path: samples\Physics\PhysicsSample.vcxproj
            configuration: Debug
          - sample: PhysicsSample
            path: samples\Physics\PhysicsSample.vcxproj
            configuration: Release
          - sample: UISample
            path: samples\UI\UISample.vcxproj
            configuration: Debug
          - sample: UISample
            path: samples\UI\UISample.vcxproj
            configuration: Release
          - sample: LayoutSample
            path: samples\UI\Layout\LayoutSample.vcxproj
            configuration: Debug
          - sample: LayoutSample
            path: samples\UI\Layout\LayoutSample.vcxproj
            configuration: Release
          - sample: LODSample
            path: samples\LOD\LODSample.vcxproj
            configuration: Debug
          - sample: LODSample
            path: samples\LOD\LODSample.vcxproj
            configuration: Release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: engine-interop-${{ matrix.configuration }}
          path: .

      - name: Build ${{ matrix.sample }}
        run: msbuild "${{ matrix.path }}" /p:Configuration=${{ matrix.configuration }} /p:Platform=x64 /v:minimal
        shell: cmd

  build-csharp:
    name: Build C# Editor (${{ matrix.configuration }})
    runs-on: windows-2022
    timeout-minutes: 30
    needs: build-engine
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('Editor/KojeomEditor/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: engine-interop-${{ matrix.configuration }}
          path: .

      - name: Restore Dependencies
        run: dotnet restore Editor/KojeomEditor/KojeomEditor.csproj
        shell: cmd

      - name: Build KojeomEditor
        run: dotnet build Editor/KojeomEditor/KojeomEditor.csproj -c ${{ matrix.configuration }}
        shell: cmd

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build-engine, build-samples, build-csharp]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          echo "build-engine: ${{ needs.build-engine.result }}"
          echo "build-samples: ${{ needs.build-samples.result }}"
          echo "build-csharp: ${{ needs.build-csharp.result }}"
          if [[ "${{ needs.build-engine.result }}" == "success" && \
                "${{ needs.build-samples.result }}" == "success" && \
                "${{ needs.build-csharp.result }}" == "success" ]]; then
            exit 0
          fi
          exit 1
