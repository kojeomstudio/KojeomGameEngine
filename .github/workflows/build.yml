name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-cpp:
    name: Build C++ Engine & Samples
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Debug, Release]
        platform: [x64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Engine
        run: msbuild KojeomEngine.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} /t:Engine
        shell: cmd

      - name: Build EngineInterop
        run: msbuild KojeomEngine.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} /t:EngineInterop
        shell: cmd

      - name: Build All Samples
        run: msbuild KojeomEngine.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} /t:BasicRenderingSample,LightingSample,PBRSample,PostProcessingSample,TerrainSample,WaterSample,SkySample,ParticlesSample,SkeletalMeshSample,GameplaySample,PhysicsSample,UISample,LayoutSample,AnimationStateMachineSample,LODSample,DebugRenderingSample
        shell: cmd

  build-csharp:
    name: Build C# Editor
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build KojeomEditor
        run: dotnet build Editor/KojeomEditor/KojeomEditor.csproj -c Release
        shell: cmd
